# ==========================================================
# Namespace
# ==========================================================
apiVersion: v1
kind: Namespace
metadata:
  name: dev-namespace

---
# ==========================================================
# aws-auth ConfigMap
# (EKS Authentication Mapping)
# ==========================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: aws-auth
  namespace: kube-system
data:
  mapRoles: |
    - rolearn: arn:aws:iam::<ACCOUNT_ID>:role/eks-node-group-role
      username: system:node:{{EC2PrivateDNSName}}
      groups:
        - system:bootstrappers
        - system:nodes

  mapUsers: |
    - userarn: arn:aws:iam::<ACCOUNT_ID>:user/dev-user
      username: dev-user
      groups:
        - dev-group

    - userarn: arn:aws:iam::<ACCOUNT_ID>:user/readonly-user
      username: readonly-user
      groups:
        - readonly-group

---
# ==========================================================
# Namespace Role
# ==========================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: developer-role
  namespace: dev-namespace
rules:
  - apiGroups: ["", "apps", "batch"]
    resources:
      - pods
      - services
      - deployments
      - jobs
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - delete

---
# ==========================================================
# Namespace RoleBinding
# ==========================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: developer-rolebinding
  namespace: dev-namespace
subjects:
  - kind: Group
    name: dev-group
    apiGroup: rbac.authorization.k8s.io

roleRef:
  kind: Role
  name: developer-role
  apiGroup: rbac.authorization.k8s.io

---
# ==========================================================
# ClusterRole (Read Only)
# ==========================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: readonly-cluster-role
rules:
  - apiGroups: ["", "apps", "batch"]
    resources:
      - pods
      - services
      - deployments
      - jobs
    verbs:
      - get
      - list
      - watch

---
# ==========================================================
# ClusterRoleBinding
# ==========================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: readonly-cluster-rolebinding
subjects:
  - kind: Group
    name: readonly-group
    apiGroup: rbac.authorization.k8s.io

roleRef:
  kind: ClusterRole
  name: readonly-cluster-role
  apiGroup: rbac.authorization.k8s.io

---
# ==========================================================
# ServiceAccount for IRSA
# ==========================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: s3-access
  namespace: default
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/EKS_S3_IRSA_Role

---
# ==========================================================
# Pod using IRSA
# ==========================================================
apiVersion: v1
kind: Pod
metadata:
  name: s3-reader
spec:
  serviceAccountName: s3-access
  containers:
    - name: awscli
      image: amazon/aws-cli:latest
      command:
        - /bin/sh
        - -c
      args:
        - |
          aws sts get-caller-identity
          aws s3 ls
          sleep 3600
